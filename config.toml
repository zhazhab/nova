# Nova 配置文件模板
# 三层加载优先级（低 → 高）：
#   1. 内置默认值
#   2. 全局启动配置：项目根或可执行文件旁 config.toml（用于 nova_dir 等启动级参数）
#   3. 用户级：<nova_dir>/config.toml
#   4. 工作区级：<workspace>/.nova/config.toml
# 环境变量（OPENAI_API_KEY、OPENAI_MODEL 等）始终最高优先级，仅运行时覆盖，不写盘。
#
# 字段留空表示继承上层。
# nova_dir 仅在全局启动配置或 NOVA_DIR 环境变量中生效；用户级/工作区级会忽略并过滤该字段。

# 模型
openai_api_key = ""
openai_base_url = "https://api.deepseek.com"
openai_model = "deepseek-v4-pro"

# 可选：配置多个 OpenAI 协议兼容平台，并按 Agent 分配。模型名同时作为配置名。
# 不配置 temperature 时使用平台/模型默认值。
# 快捷选项 Agent 和版本说明 Agent 内置默认 enable_thinking=false，其他 Agent 默认不传思考参数。
#
# [[model_profiles]]
# openai_base_url = "https://api.deepseek.com"
# openai_api_key = ""
# openai_model = "deepseek-v4-pro"
#
# [[model_profiles]]
# openai_base_url = "https://api.openai.com/v1"
# openai_api_key = ""
# openai_model = "gpt-4.1"
#
# [agent_models.ide]
# profile_id = "deepseek-v4-pro"
# temperature = 0.7
# enable_thinking = true       # 可选：不填则不传；适用于支持 enable_thinking 的 OpenAI 兼容平台
# reasoning_effort = "medium"  # 可选：low / medium / high；不填则不传
#
# [agent_models.config_manager]
# profile_id = "gpt-4.1"
# temperature = 0.2
#
# 可选：为不同 Agent 叠加自定义 system prompt。
# 自定义提示在行为、创作偏好、策略和风格上优先于 Nova 内置提示，
# 但不会覆盖工具权限、输出协议、互动禁写文件、结构化 JSON 要求和后端校验边界。
#
# [agent_prompts.ide]
# system_prompt = "你在章节创作前先用更短的要点确认写作意图；正文保持冷静、克制、少解释。"
#
# [agent_prompts.interactive_story]
# system_prompt = "更主动地制造 NPC 反应和场景压力，但不要替玩家做重大选择。"
#
# 可选：按 Agent 调整工具权限。字段不填表示继承内置默认值；
# `web_search` 使用 Eino Ext DuckDuckGo V2 预制工具注册为网页搜索。
#
# [agent_tools.ide]
# web_search = true
#
# [agent_tools.interactive_story]
# web_search = false

# 路径
# skills_dir 是启动时加载的内置/只读 Skills 根目录。
# 用户自定义 Skills 由界面写入 <nova_dir>/skills 或 <workspace>/.nova/skills。
skills_dir = "./skills"
nova_dir = "./.nova"

# 修改端口号
backend_port = 8080
frontend_port = 8081

# 编辑器
auto_save_enabled = true
auto_save_interval_ms = 1500
# 隐藏章节正文在 Agent 流中的输出，文件仍正常写入。
hide_novel_chapter_body_in_live_output = false
chapter_filename_format = "ch{order:05}-{chapter}-{title}.md"
volume_dir_format = "v{order:05}-{volume}"
draft_flow_enabled = false
chapter_group_min = 3
chapter_group_max = 8
version_timed_enabled = true
version_timed_interval_minutes = 10
version_agent_enabled = true
version_agent_char_threshold = 3000

# 外观
theme = "dark"
# 可选：system-sans / humanist-sans / apple-system / microsoft-yahei / system-serif / source-han-serif / lxgw-wenkai / mono
ui_font_family = "apple-system"
ui_font_size = 14
reading_font_family = "apple-system"
reading_font_size = 18

# Agent
model_max_retries = 5
plan_mode_default = false
# 写作 Agent 默认叙事编排 ID（当前工作区级配置，字段名沿用 ide_story_teller_id）
ide_story_teller_id = "classic"

# 互动模式
interactive_stage_line_height = 1.78
