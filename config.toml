# Nova 配置文件模板
# 三层加载优先级（低 → 高）：
#   1. 内置默认值
#   2. 全局启动配置：项目根或可执行文件旁 config.toml（用于 nova_dir 等启动级参数）
#   3. 用户级：<nova_dir>/config.toml
#   4. 工作区级：<workspace>/.nova/config.toml
# 环境变量（OPENAI_API_KEY、OPENAI_MODEL 等）始终最高优先级，仅运行时覆盖，不写盘。
#
# 字段留空表示继承上层。
# nova_dir 仅在全局启动配置或 NOVA_DIR 环境变量中生效；用户级/工作区级会忽略并过滤该字段。

# 语言模型。默认模型也放在 model_profiles 列表里，id 固定为 default，name 可作为显示别名。
# 不配置 temperature 时使用平台/模型默认值。
# 快捷选项 Agent 和版本说明 Agent 内置默认 enable_thinking=false，其他 Agent 默认不传思考参数。
[[model_profiles]]
id = "default"
name = "DeepSeek 写作"
openai_base_url = "https://api.deepseek.com"
openai_api_key = ""
openai_model = "deepseek-v4-pro"

# 可选：配置更多 OpenAI 协议兼容平台，并按 Agent 分配。模型名同时作为配置名，name 可作为显示别名。
# [[model_profiles]]
# openai_base_url = "https://api.openai.com/v1"
# openai_api_key = ""
# openai_model = "gpt-4.1"
#
# [agent_models.ide]
# profile_id = "deepseek-v4-pro"
# temperature = 0.7
# enable_thinking = true       # 可选：不填则不传；适用于支持 enable_thinking 的 OpenAI 兼容平台
# reasoning_effort = "medium"  # 可选：low / medium / high；不填则不传
#
# [agent_models.config_manager]
# profile_id = "gpt-4.1"
# temperature = 0.2

# 图像模型。默认只接入 OpenAI 标准 Images API；可配置多个 profile。
# 生成结果会保存到当前工作区 assets/image/generated/。
default_image_api_profile_id = "default"

[[image_api_profiles]]
id = "default"
name = "OpenAI 图片"
provider = "openai"
openai_base_url = "https://api.openai.com/v1"
openai_api_key = ""
openai_model = "gpt-image-1"
default_quality = "auto"
default_output_format = "png"
#
# 可选：为不同 Agent 叠加自定义 system prompt。
# 自定义提示在行为、创作偏好、策略和风格上优先于 Nova 内置提示，
# 但不会覆盖工具权限、输出协议、互动禁写文件、结构化 JSON 要求和后端校验边界。
#
# [agent_prompts.ide]
# system_prompt = "你在章节创作前先用更短的要点确认写作意图；正文保持冷静、克制、少解释。"
#
# [agent_prompts.interactive_story]
# system_prompt = "更主动地制造 NPC 反应和场景压力，但不要替玩家做重大选择。"
#
# 可选：按 Agent 调整工具权限。字段不填表示继承内置默认值；
# `web_search` 使用 Eino Ext DuckDuckGo V2 预制工具注册为网页搜索。
#
# [agent_tools.ide]
# web_search = true
#
# [agent_tools.interactive_story]
# web_search = false

# 预置写作 SubAgent。它们只是普通配置项，不是 Go 代码内置默认值；
# 可以在 Agents 页像自定义 SubAgent 一样改名、改提示词、限制工具或关闭。
# parents = ["ide"] 表示只供写作 Agent 使用。
[[sub_agents]]
id = "context-planner"
name = "上下文规划"
description = "写作前整理范围、目标、约束和风险，不写正文。"
enabled = true
parents = ["ide"]
system_prompt = '''
你是写作规划 SubAgent。只负责在正文生成前整理 Context Plan，不写正文、不改文件。
可读取必要前文、CREATOR.md、大纲、进度、角色状态和资料库作为依据。
必须从用户 Prompt 判断本次写作范围、目标、关键事件、角色状态、设定约束、风格约束和主要风险；如果信息不足，标出不确定点和需要父 Agent 决策的选项。
输出简洁结构化计划，避免复述大段原文。
'''

[[sub_agents]]
id = "writer"
name = "初稿写作"
description = "按用户要求、Writing Skill 和上下文计划生成正文初稿。"
enabled = true
parents = ["ide"]
system_prompt = '''
你是写作初稿 SubAgent。根据用户 Prompt、已加载 Writing Skill、父 Agent 提供的 Context Plan 和必要上下文生成正文初稿。
严格按用户要求的范围写作，不默认推进到下一章，不擅自改写大纲、进度、角色状态或资料库。
可读取必要前文、CREATOR.md、大纲、进度、角色状态和资料库以保持连续性。
若允许写入且任务要求落盘，将正文写入父 Agent 指定路径或合理的新章节文件，并返回文件路径、写作范围、关键决策和未处理风险；不要输出审稿报告。
'''

[[sub_agents]]
id = "reviewer"
name = "严格审稿"
description = "审查新增章节的连续性、设定、人物、节奏和语言问题。"
enabled = true
parents = ["ide"]
system_prompt = '''
你是严格审稿 SubAgent，只审稿，不改正文，不写文件。
可读取必要前文、CREATOR.md、大纲、进度、角色状态和资料库作为对照依据。
重点检查新增章节是否符合任务要求/用户 Prompt、CREATOR.md、长期大纲、角色设定与状态、世界观和已有连续性；评估剧情推进、人物行为动机、设定一致性、节奏、语言质量和可读性。
按严重程度输出问题、证据位置、影响和可执行改进建议；不要为了礼貌表扬，不要重写正文。
输出结构：severity（blocker/major/minor）、dimension、evidence、impact、fix_instruction、keep。
'''

[[sub_agents]]
id = "fixer"
name = "定向修稿"
description = "根据审稿意见修正真正需要修的问题，同时保留原故事。"
enabled = true
parents = ["ide"]
system_prompt = '''
你是修稿 SubAgent。根据 reviewer 的结构化问题和父 Agent 的明确要求修正文稿，只修真正需要修的问题。
必须保留用户要求的内容、有效情节节点、人物声线、强段落、伏笔和连续性；不要把初稿重写成另一个故事。
优先修复 blocker/major；如果只有 minor，只做轻度润色。
若允许写入，直接修改父 Agent 指定文件并返回修改摘要；否则输出修订稿和变更说明。
不要更新 progress.md、character-state.md 或资料库。
'''

[[sub_agents]]
id = "final-gate"
name = "最终门禁"
description = "检查修订稿是否满足用户要求、计划、设定和风格约束。"
enabled = true
parents = ["ide"]
system_prompt = '''
你是终检 SubAgent。只对修订稿做最终质量门禁，不扩写正文。
核对用户 Prompt、Context Plan、Writing Skill 要求、CREATOR.md、长期大纲、角色设定、世界观、已有连续性和风格约束。
输出 pass/fail；fail 时只列 blocker 和必须返修的问题，包含证据位置、原因和给 fixer 的明确修复指令；pass 时给出简短通过理由和仍需父 Agent 留意的风险。
不要新增额外 reviewer 流程。
'''

[[sub_agents]]
id = "memory-patcher"
name = "状态补丁"
description = "根据最终稿生成进度、角色状态、世界状态和伏笔更新建议。"
enabled = true
parents = ["ide"]
system_prompt = '''
你是写作状态更新 SubAgent。只基于最终稿中已经发生并确认的内容生成状态更新建议，不虚构未写出的剧情。
可读取 progress.md、character-state.md、CREATOR.md、大纲和资料库以判断变化。
输出 progress、character_state、world_state、foreshadowing 等可应用 patch，写清依据和目标文件；只更新本轮即时进展和角色当前状态。
长期资料库只在身份、长期关系、能力体系、世界规则等稳定 canon 明确变化时提出建议，并要求父 Agent 先确认；不要擅自改写长期资料库。
'''

# 路径
# skills_dir 是启动时加载的内置/只读 Skills 根目录。
# 用户自定义 Skills 由界面写入 <nova_dir>/skills 或 <workspace>/.nova/skills。
skills_dir = "./skills"
nova_dir = "./.nova"

# 修改端口号
backend_port = 8080
frontend_port = 8081

# 编辑器
auto_save_enabled = true
auto_save_interval_ms = 1500
# 隐藏章节正文在 Agent 流中的输出，文件仍正常写入。
hide_novel_chapter_body_in_live_output = false
chapter_filename_format = "ch{order:05}-{chapter}-{title}.md"
volume_dir_format = "v{order:05}-{volume}"
chapter_group_min = 3
chapter_group_max = 8
version_timed_enabled = true
version_timed_interval_minutes = 10
version_agent_enabled = true
version_agent_char_threshold = 3000

# 外观
theme = "dark"
# 可选：system-sans / humanist-sans / apple-system / microsoft-yahei / system-serif / source-han-serif / lxgw-wenkai / mono
ui_font_family = "apple-system"
ui_font_size = 14
reading_font_family = "apple-system"
reading_font_size = 18

# Agent
model_max_retries = 5
plan_mode_default = false
# 写作 Agent 默认叙事编排 ID（当前工作区级配置，字段名沿用 ide_story_teller_id）
ide_story_teller_id = "classic"

# 互动模式
interactive_stage_line_height = 1.78
